<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nike Store | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <p class="eyebrow">NIKE</p>
      <h1>Welcome back</h1>
      <p>Sign in to shop the latest Nike sneakers.</p>
    </div>

    <form id="login-form" class="login-form">
      <label>
        Email
        <input type="email" id="email" placeholder="you@example.com" required />
      </label>
      <label>
        Password
        <input type="password" id="password" placeholder="Enter password" required />
      </label>
      <button type="submit">Login</button>
      <p class="login-hint">Demo: demo@nike.com / nike123</p>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const AUTH_KEY = 'nike-store-auth';

    if (localStorage.getItem(AUTH_KEY)) {
      window.location.href = 'index.html';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert('Please enter your email and password.');
        return;
      }

      if (email === 'demo@nike.com' && password === 'nike123') {
        localStorage.setItem(AUTH_KEY, JSON.stringify({ email, name: 'Nike Lover' }));
        window.location.href = 'index.html';
        return;
      }

      if (email && password) {
        localStorage.setItem(AUTH_KEY, JSON.stringify({ email, name: email.split('@')[0] }));
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
